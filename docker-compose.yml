services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: stfd_db
      POSTGRES_USER: stfd_user
      POSTGRES_PASSWORD: stfd_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stfd_user -d stfd_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: django-insecure-dev-key-change-in-production
      DEBUG: "True"
      DB_NAME: stfd_db
      DB_USER: stfd_user
      DB_PASSWORD: stfd_pass
      DB_HOST: db
      DB_PORT: "5432"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_media:/app/media

volumes:
  postgres_data:
  backend_media:
